# JIRA Connection Settings
jira:
  base_url: "https://your-domain.atlassian.net"
  username: "your-email@example.com"
  api_token: "your-api-token"   # Generate at: https://id.atlassian.com/manage-profile/security/api-tokens

# Excel file path (absolute or relative to this config file)
excel:
  file_path: "input.xlsx"
  sheet_name: "Sheet1"          # Sheet name to read from; use null for the first sheet

# Column in the Excel sheet that contains JIRA Issue IDs (e.g. "PROJECT-123")
jira_id_column: "JIRA_ID"

# Field mappings: excel_column_name -> jira_field
# Supported jira_field values:
#   Simple text fields   : summary, description, priority, status, assignee, labels
#   Custom fields        : customfield_XXXXX  (find ID in JIRA field config)
#   Multi-value fields   : labels, components  (use comma-separated values in Excel)
#
# Update mode per field:
#   "replace"  — overwrite the existing JIRA value entirely (default)
#   "append"   — append to existing value (supported for description, labels, components, multi_select)
#
# field_type — controls how the Excel value is serialised before sending to JIRA:
#   "text"         — plain string (default; works for summary, description, etc.)
#   "select"       — single-select / dropdown  e.g. "In Progress"  → {"value": "In Progress"}
#   "radio"        — radio-button field        (same payload as select)
#   "multi_select" — multi-select dropdown     e.g. "Red,Blue"     → [{"value":"Red"},{"value":"Blue"}]
#   "checkbox"     — checkbox field            (same payload as multi_select)
#   "number"       — numeric custom field
#   "date"         — date field, expects YYYY-MM-DD in Excel
#
# How to find the customfield_XXXXX ID for a JIRA field:
#   GET https://<your-domain>.atlassian.net/rest/api/3/field
#   Look for the field by name in the response.
field_mappings:
  - excel_column: "Summary"
    jira_field: "summary"
    update_mode: "replace"

  - excel_column: "Description"
    jira_field: "description"
    update_mode: "replace"

  - excel_column: "Priority"
    jira_field: "priority"
    update_mode: "replace"
    # Valid values: Highest, High, Medium, Low, Lowest

  - excel_column: "Assignee"
    jira_field: "assignee"
    update_mode: "replace"
    # Value should be the JIRA account ID or email address

  - excel_column: "Labels"
    jira_field: "labels"
    update_mode: "replace"
    # Comma-separated labels in Excel, e.g. "bug,backend,v2"

  - excel_column: "Story Points"
    jira_field: "story_points"
    update_mode: "replace"
    # Story points — maps to customfield_10016 on most JIRA instances

  # --- Dropdown / Select examples ---

  # Single-select dropdown (e.g. "Environment" field with options like "Production", "Staging")
  # - excel_column: "Environment"
  #   jira_field: "customfield_10200"
  #   field_type: "select"
  #   update_mode: "replace"

  # Radio button field (same payload as select)
  # - excel_column: "Team"
  #   jira_field: "customfield_10201"
  #   field_type: "radio"
  #   update_mode: "replace"

  # Multi-select dropdown (comma-separated values in Excel e.g. "Frontend,Backend")
  # - excel_column: "Affected Areas"
  #   jira_field: "customfield_10202"
  #   field_type: "multi_select"
  #   update_mode: "replace"   # use "append" to add to existing selections

  # Checkbox field (comma-separated in Excel)
  # - excel_column: "Platforms"
  #   jira_field: "customfield_10203"
  #   field_type: "checkbox"
  #   update_mode: "replace"

  # Number custom field
  # - excel_column: "Estimated Hours"
  #   jira_field: "customfield_10204"
  #   field_type: "number"

  # Date custom field (value in Excel must be YYYY-MM-DD)
  # - excel_column: "Due Date"
  #   jira_field: "customfield_10205"
  #   field_type: "date"

  # Plain text custom field (default — no field_type needed)
  # - excel_column: "Customer Name"
  #   jira_field: "customfield_10100"
  #   update_mode: "replace"

# Behaviour settings
settings:
  dry_run: false          # true = print what would be updated, without actually calling JIRA
  skip_empty_cells: true  # true = skip a field update if the Excel cell is blank
  log_file: "jira_update.log"
  log_level: "INFO"       # DEBUG | INFO | WARNING | ERROR


